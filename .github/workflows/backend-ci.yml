name: backend-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  # ── Job 1 : tests unitaires (rapide, pas de serveur ni MongoDB) ───────────
  unit-tests:
    name: Unit tests (cache + pagination)
    runs-on: ubuntu-latest

    env:
      MONGO_URL: mongodb://localhost:27017/test
      JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
      OPENAI_API_KEY: sk-ci-dummy
      STRIPE_API_KEY: sk_test_ci_dummy
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
      BREVO_API_KEY: ci-dummy-brevo
      STRIPE_PRICE_ID_MONTHLY: price_ci_monthly
      STRIPE_PRICE_ID_YEARLY: price_ci_yearly
      FRONTEND_URL: http://localhost:3000
      ADMIN_CREATION_SECRET: ci-admin-secret
      DEFAULT_ADMIN_EMAIL: admin@ci-test.local
      DEFAULT_ADMIN_PASSWORD: TestAdminPassword123!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        run: |
          pytest tests/test_cache_logic.py tests/test_pagination_gerant.py tests/test_security_audit.py tests/test_timeseries_migration.py -v

  # ── Job 2 : test d'intégration KPI (nécessite MongoDB + serveur) ──────────
  kpi-json-safe:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'" 
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_BASE_URL: http://127.0.0.1:8001
      MONGO_URL: mongodb://127.0.0.1:27017/
      TEST_PASSWORD: TestUserPassword123!
      # Required by Pydantic Settings — dummy values safe for CI (no real credentials)
      JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
      OPENAI_API_KEY: sk-ci-dummy-openai-key
      STRIPE_API_KEY: sk_test_ci_dummy_stripe_key
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_webhook_secret
      BREVO_API_KEY: ci-dummy-brevo-key
      STRIPE_PRICE_ID_MONTHLY: price_ci_monthly
      STRIPE_PRICE_ID_YEARLY: price_ci_yearly
      FRONTEND_URL: http://localhost:3000
      ADMIN_CREATION_SECRET: ci-admin-secret
      DEFAULT_ADMIN_EMAIL: admin@ci-test.local
      DEFAULT_ADMIN_PASSWORD: TestAdminPassword123!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API server (uvicorn)
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8001 > ../uvicorn.log 2>&1 &
          echo $! > ../uvicorn.pid

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8001/health >/dev/null; then
              echo "API healthy";
              exit 0;
            fi
            sleep 1
          done
          echo "API did not become healthy";
          echo "--- uvicorn.log ---";
          tail -n 200 uvicorn.log || true
          exit 1

      - name: Run non-regression test (KPI seller entry JSON-safe)
        run: |
          pytest -q backend/tests/test_kpi_seller_entry_json_safe.py

      - name: Run AI cache integration tests
        run: |
          pytest -q backend/tests/test_ai_cache_integration.py

      - name: Run gerant sellers pagination integration tests
        run: |
          pytest -q backend/tests/test_pagination_gerant_integration.py

      - name: Dump server log on failure
        if: failure()
        run: |
          echo "--- uvicorn.log ---"
          tail -n 300 uvicorn.log || true

      - name: Stop API server
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then kill $(cat uvicorn.pid) || true; fi
